kind = "web"
previewPath = "/"
title = "CRMBS — Campus Resource Management and Booking System"
version = "1.0.0"
id = "artifacts/crmbs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18817

[services.development]
run = "pnpm --filter @workspace/crmbs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crmbs", "run", "build" ]
publicDir = "artifacts/crmbs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18817"
BASE_PATH = "/"
